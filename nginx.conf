server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets forever
    location ~* \.(js|css|woff2?|ttf|otf|ico|png|jpg|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache the root HTML (so deploys are picked up immediately)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
